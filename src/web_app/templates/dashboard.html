{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Summary Cards -->
    <div class="col-md-12 mb-4">
        <div class="row" id="summary-cards">
            <!-- Cards will be populated by JavaScript -->
        </div>
    </div>
</div>

<div class="row">
    <!-- Monthly Trend Chart -->
    <div class="col-md-8 mb-4">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title">
                    <i class="fas fa-chart-line me-2"></i>Monthly Revenue Trend
                </h5>
            </div>
            <div class="card-body">
                <canvas id="monthlyTrendChart"></canvas>
            </div>
        </div>
    </div>
    
    <!-- Payment Terms Breakdown -->
    <div class="col-md-4 mb-4">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title">
                    <i class="fas fa-pie-chart me-2"></i>Payment Terms
                </h5>
            </div>
            <div class="card-body">
                <canvas id="paymentTermsChart"></canvas>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <!-- Top Clients -->
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title">
                    <i class="fas fa-users me-2"></i>Top Clients by Revenue
                </h5>
            </div>
            <div class="card-body">
                <canvas id="topClientsChart"></canvas>
            </div>
        </div>
    </div>
    
    <!-- Contract Details Table -->
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title">
                    <i class="fas fa-table me-2"></i>Contract Details
                </h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-sm" id="contractsTable">
                        <thead>
                            <tr>
                                <th>Client</th>
                                <th>Contract Value</th>
                                <th>Recognized</th>
                                <th>Remaining</th>
                                <th>Progress</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data will be populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Loading Spinner -->
<div id="loading" class="text-center" style="display: none;">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Initialize dashboard when page loads
    document.addEventListener('DOMContentLoaded', function() {
        loadDashboard();
    });
</script>
{% endblock %}
